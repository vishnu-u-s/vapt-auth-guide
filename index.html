<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sign In — Auth Guide VAPT Reference</title>
<meta name="description" content="Secure login portal for the Authentication Methods VAPT Reference Guide.">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500;600&family=Outfit:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --bg-base: #0d0f17;
  --bg-glass: rgba(20,24,40,0.80);
  --border: rgba(255,255,255,0.07);
  --border-bright: rgba(255,255,255,0.15);
  --text-primary: #e8eaf6;
  --text-secondary: #8b90b0;
  --text-muted: #4a4f6a;
  --cyan: #7dcfff;
  --purple: #bb9af7;
  --green: #9ece6a;
  --red: #f7768e;
  --radius: 16px;
  --radius-sm: 10px;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

body {
  font-family: 'Outfit', sans-serif;
  background: var(--bg-base);
  color: var(--text-primary);
  min-height: 100vh;
  display: flex;
  align-items: center;
  justify-content: center;
  overflow: hidden;
  position: relative;
}

/* ── Animated background grid ── */
body::before {
  content: '';
  position: fixed;
  inset: 0;
  background-image:
    linear-gradient(rgba(125,207,255,0.03) 1px, transparent 1px),
    linear-gradient(90deg, rgba(125,207,255,0.03) 1px, transparent 1px);
  background-size: 40px 40px;
  pointer-events: none;
  z-index: 0;
}

/* ── Floating orbs ── */
.orb {
  position: fixed;
  border-radius: 50%;
  filter: blur(90px);
  pointer-events: none;
  z-index: 0;
  animation: orb-drift 14s ease-in-out infinite alternate;
}
.orb-1 { width: 560px; height: 560px; background: rgba(122,162,247,0.09); top: -160px; right: -140px; }
.orb-2 { width: 420px; height: 420px; background: rgba(187,154,247,0.07); bottom: -80px; left: -120px; animation-delay: -7s; }
.orb-3 { width: 280px; height: 280px; background: rgba(125,207,255,0.06); top: 55%; left: 38%; animation-delay: -3.5s; }
@keyframes orb-drift {
  from { transform: translate(0,0) scale(1); }
  to   { transform: translate(28px, 18px) scale(1.06); }
}

/* ── Login card ── */
.login-wrap {
  position: relative;
  z-index: 1;
  width: 100%;
  max-width: 420px;
  padding: 1rem;
}

.card {
  background: var(--bg-glass);
  backdrop-filter: blur(28px);
  -webkit-backdrop-filter: blur(28px);
  border: 1px solid var(--border-bright);
  border-radius: var(--radius);
  padding: 2.5rem 2.25rem 2.25rem;
  box-shadow: 0 24px 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(255,255,255,0.03) inset;
  animation: card-in .45s cubic-bezier(.22,.68,0,1.2);
}
@keyframes card-in {
  from { opacity: 0; transform: translateY(28px) scale(.97); }
  to   { opacity: 1; transform: translateY(0) scale(1); }
}

/* ── Logo / branding ── */
.brand {
  display: flex;
  align-items: center;
  gap: 12px;
  margin-bottom: 2rem;
}
.brand-icon {
  width: 44px;
  height: 44px;
  background: linear-gradient(135deg, var(--cyan), var(--purple));
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
  font-family: 'JetBrains Mono', monospace;
  font-size: 14px;
  font-weight: 700;
  color: #0d0f17;
  flex-shrink: 0;
  box-shadow: 0 4px 20px rgba(125,207,255,0.25);
}
.brand-text h1 {
  font-size: 17px;
  font-weight: 700;
  color: var(--text-primary);
  line-height: 1.2;
}
.brand-text p {
  font-size: 11px;
  color: var(--text-muted);
  font-family: 'JetBrains Mono', monospace;
  margin-top: 2px;
}

/* ── Form heading ── */
.form-heading {
  margin-bottom: 1.75rem;
}
.form-heading h2 {
  font-size: 22px;
  font-weight: 700;
  background: linear-gradient(90deg, var(--cyan), var(--purple));
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;
  background-clip: text;
  line-height: 1.25;
  margin-bottom: .35rem;
}
.form-heading p {
  font-size: 13px;
  color: var(--text-secondary);
  line-height: 1.5;
}

/* ── Form fields ── */
.field {
  margin-bottom: 1.1rem;
}
.field label {
  display: block;
  font-size: 11.5px;
  font-weight: 600;
  letter-spacing: .04em;
  text-transform: uppercase;
  color: var(--text-muted);
  margin-bottom: .45rem;
}
.input-wrap {
  position: relative;
}
.input-icon {
  position: absolute;
  left: 13px;
  top: 50%;
  transform: translateY(-50%);
  font-size: 15px;
  pointer-events: none;
  opacity: .55;
}
.field input {
  width: 100%;
  background: rgba(255,255,255,0.04);
  border: 1px solid var(--border);
  border-radius: var(--radius-sm);
  padding: 11px 13px 11px 40px;
  font-size: 14px;
  color: var(--text-primary);
  font-family: 'Outfit', sans-serif;
  outline: none;
  transition: border-color .2s, box-shadow .2s, background .2s;
}
.field input:focus {
  border-color: var(--cyan);
  background: rgba(125,207,255,0.04);
  box-shadow: 0 0 0 3px rgba(125,207,255,0.12);
}
.field input::placeholder { color: var(--text-muted); }

/* password toggle */
.toggle-pw {
  position: absolute;
  right: 12px;
  top: 50%;
  transform: translateY(-50%);
  background: none;
  border: none;
  color: var(--text-muted);
  cursor: pointer;
  font-size: 14px;
  padding: 4px;
  transition: color .2s;
}
.toggle-pw:hover { color: var(--text-secondary); }

/* ── Error banner ── */
.error-banner {
  display: none;
  align-items: center;
  gap: 8px;
  background: rgba(247,118,142,0.08);
  border: 1px solid rgba(247,118,142,0.25);
  border-radius: var(--radius-sm);
  padding: .65rem 1rem;
  font-size: 12.5px;
  color: var(--red);
  margin-bottom: 1.1rem;
  animation: shake .3s ease;
}
.error-banner.show { display: flex; }
@keyframes shake {
  0%,100% { transform: translateX(0); }
  25% { transform: translateX(-6px); }
  75% { transform: translateX(6px); }
}

/* ── Submit button ── */
.btn-login {
  width: 100%;
  padding: 12px;
  border: none;
  border-radius: var(--radius-sm);
  background: linear-gradient(135deg, var(--cyan), var(--purple));
  color: #0d0f17;
  font-size: 14px;
  font-weight: 700;
  font-family: 'Outfit', sans-serif;
  cursor: pointer;
  transition: opacity .2s, transform .15s, box-shadow .2s;
  position: relative;
  overflow: hidden;
  box-shadow: 0 4px 24px rgba(125,207,255,0.2);
  letter-spacing: .03em;
}
.btn-login::after {
  content: '';
  position: absolute;
  inset: 0;
  background: rgba(255,255,255,0.12);
  opacity: 0;
  transition: opacity .2s;
}
.btn-login:hover::after { opacity: 1; }
.btn-login:hover { transform: translateY(-1px); box-shadow: 0 8px 32px rgba(125,207,255,0.3); }
.btn-login:active { transform: translateY(0); }
.btn-login:disabled { opacity: .55; cursor: not-allowed; transform: none; }

/* spinner inside button */
.spinner {
  display: none;
  width: 16px;
  height: 16px;
  border: 2px solid rgba(13,15,23,0.3);
  border-top-color: #0d0f17;
  border-radius: 50%;
  animation: spin .7s linear infinite;
  margin: 0 auto;
}
@keyframes spin { to { transform: rotate(360deg); } }
.btn-login.loading .btn-text { display: none; }
.btn-login.loading .spinner { display: block; }

/* ── Footer note ── */
.login-footer {
  margin-top: 1.5rem;
  text-align: center;
  font-size: 11px;
  color: var(--text-muted);
  line-height: 1.6;
}
.login-footer span {
  display: inline-block;
  background: rgba(125,207,255,0.08);
  border: 1px solid rgba(125,207,255,0.15);
  border-radius: 6px;
  padding: 2px 8px;
  color: var(--cyan);
  font-family: 'JetBrains Mono', monospace;
  font-size: 10px;
  margin: 2px;
}

/* ── Security badge strip ── */
.badges {
  display: flex;
  gap: 8px;
  justify-content: center;
  margin-top: 1.25rem;
  flex-wrap: wrap;
}
.badge {
  font-size: 10px;
  padding: 3px 10px;
  border-radius: 20px;
  border: 1px solid var(--border);
  color: var(--text-muted);
  font-family: 'JetBrains Mono', monospace;
  display: flex;
  align-items: center;
  gap: 5px;
}
</style>
</head>
<body>

<div class="orb orb-1"></div>
<div class="orb orb-2"></div>
<div class="orb orb-3"></div>

<div class="login-wrap">
  <div class="card">

    <!-- Brand -->
    <div class="brand">
      <div class="brand-icon">VA</div>
      <div class="brand-text">
        <h1>Auth Guide</h1>
        <p>VAPT Reference v2.0</p>
      </div>
    </div>

    <!-- Heading -->
    <div class="form-heading">
      <h2>Welcome back</h2>
      <p>Sign in to access the Authentication Methods reference guide.</p>
    </div>

    <!-- Error -->
    <div class="error-banner" id="error-banner" role="alert">
      <span>⚠</span>
      <span id="error-msg">Invalid credentials. Please try again.</span>
    </div>

    <!-- Form -->
    <form id="login-form" onsubmit="doLogin(event)">

      <div class="field">
        <label for="email">Email</label>
        <div class="input-wrap">
          <span class="input-icon">✉</span>
          <input
            type="email"
            id="email"
            name="email"
            placeholder="your@email.com"
            autocomplete="email"
            required
          >
        </div>
      </div>

      <div class="field">
        <label for="password">Password</label>
        <div class="input-wrap">
          <span class="input-icon">🔒</span>
          <input
            type="password"
            id="password"
            name="password"
            placeholder="Enter your password"
            autocomplete="current-password"
            required
          >
          <button type="button" class="toggle-pw" id="toggle-pw" aria-label="Toggle password visibility">👁</button>
        </div>
      </div>

      <button type="submit" class="btn-login" id="login-btn">
        <span class="btn-text">Sign In →</span>
        <div class="spinner"></div>
      </button>
    </form>

    <!-- Footer -->
    <div class="login-footer">
      🔐 Secured by <span>Firebase Auth</span> &nbsp;·&nbsp; Hosted on <span>GitHub Pages</span>
    </div>
    <div class="badges">
      <div class="badge">🛡 TLS Encrypted</div>
      <div class="badge">🔑 Session Token</div>
      <div class="badge">🚫 No Cookie Tracking</div>
    </div>

  </div>
</div>

<!-- ══════════════════════════════════════════
     Firebase SDK (compat v9 — runs in browser)
════════════════════════════════════════════ -->
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="firebase-config.js"></script>
<script>
  const auth = firebase.auth();

  // ── If already signed in → skip login page ──
  auth.onAuthStateChanged(user => {
    if (user) {
      window.location.replace('auth_guide_v2.html');
    }
  });

  // ── Toggle password visibility ──
  document.getElementById('toggle-pw').addEventListener('click', () => {
    const pw = document.getElementById('password');
    const btn = document.getElementById('toggle-pw');
    if (pw.type === 'password') {
      pw.type = 'text';
      btn.textContent = '🙈';
    } else {
      pw.type = 'password';
      btn.textContent = '👁';
    }
  });

  // ── Login handler ──
  function showError(msg) {
    const banner = document.getElementById('error-banner');
    document.getElementById('error-msg').textContent = msg;
    banner.classList.remove('show');
    // Force reflow to re-trigger shake animation
    void banner.offsetWidth;
    banner.classList.add('show');
  }

  function setLoading(on) {
    const btn = document.getElementById('login-btn');
    btn.classList.toggle('loading', on);
    btn.disabled = on;
  }

  async function doLogin(e) {
    e.preventDefault();
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;

    setLoading(true);

    try {
      await auth.signInWithEmailAndPassword(email, password);
      // Auth state change above will redirect automatically
    } catch (err) {
      setLoading(false);
      const code = err.code || '';
      if (code === 'auth/user-not-found' || code === 'auth/wrong-password' || code === 'auth/invalid-credential') {
        showError('Incorrect email or password. Please try again.');
      } else if (code === 'auth/invalid-email') {
        showError('Please enter a valid email address.');
      } else if (code === 'auth/too-many-requests') {
        showError('Too many failed attempts. Please wait a moment and try again.');
      } else {
        showError('Sign-in failed. Check your connection or Firebase config.');
      }
    }
  }
</script>
</body>
</html>
